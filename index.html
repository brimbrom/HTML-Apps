<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Apps</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    h1 span { color: #6c63ff; }
    p { color: #94a3b8; margin-bottom: 40px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 800px;
    }
    a.card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, transform 0.15s;
    }
    a.card:hover { border-color: #6c63ff; transform: translateY(-2px); }
    .card-icon { font-size: 2rem; margin-bottom: 12px; }
    .card h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }
    .card p { font-size: 13px; color: #94a3b8; margin: 0; }
  </style>
</head>
<body>
  <h1>HTML <span>Apps</span></h1>
  <p>Eine Sammlung von eigenständigen Web-Apps</p>
  <div class="grid">
    <a class="card" href="stock-valuation.html">
      <div class="card-icon">📈</div>
      <h2>Aktien Portfolio</h2>
      <p>Verwalte deine Aktienpositionen und berechne den aktuellen Portfoliowert.</p>
    </a>
  </div>
</body>
</html>
