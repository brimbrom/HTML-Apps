<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aktien Portfolio Bewertung</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2d3148;
      --accent:   #6c63ff;
      --accent-h: #574fd6;
      --gain:     #22c55e;
      --loss:     #ef4444;
      --neutral:  #94a3b8;
      --text:     #e2e8f0;
      --text-dim: #94a3b8;
      --radius:   10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 28px;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-h); }
    .btn-ghost { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { background: var(--border); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-danger { background: transparent; color: var(--loss); border: 1px solid transparent; padding: 4px 8px; font-size: 16px; }
    .btn-danger:hover { border-color: var(--loss); }

    /* ── Summary Cards ── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
    }
    .card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); margin-bottom: 6px; }
    .card-value { font-size: 1.35rem; font-weight: 700; white-space: nowrap; }
    .card-value.gain   { color: var(--gain); }
    .card-value.loss   { color: var(--loss); }
    .card-value.neutral { color: var(--text-dim); }

    /* ── Date Slider ── */
    .slider-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 20px;
    }
    .slider-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .slider-date-display {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .slider-date-display .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-dim);
    }
    .slider-date-display .date-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }
    .slider-date-display .date-value.loading { color: var(--accent); }
    .date-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    .date-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 3px solid var(--surface);
      box-shadow: 0 0 0 2px var(--accent);
      transition: background 0.15s;
    }
    .date-slider::-webkit-slider-thumb:hover { background: var(--accent-h); }
    .date-slider::-moz-range-thumb {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--accent);
      border: 3px solid var(--surface);
      box-shadow: 0 0 0 2px var(--accent);
      cursor: pointer;
    }
    .date-slider:disabled { opacity: 0.4; cursor: not-allowed; }
    .slider-axis {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-dim);
    }
    .slider-loading {
      font-size: 12px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Form ── */
    .form-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 28px;
    }
    .form-section h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; }
    .form-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
    .field { display: flex; flex-direction: column; gap: 4px; flex: 1 1 130px; }
    .field label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-dim); }
    .field input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      padding: 8px 10px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--text-dim); }
    .field input.autofilled { border-color: var(--gain); }

    /* ── Price auto-fetch status ── */
    .price-status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: normal;
      text-transform: none;
      letter-spacing: 0;
      margin-left: 6px;
      vertical-align: middle;
    }
    .price-status.loading { color: var(--accent); }
    .price-status.ok      { color: var(--gain); }
    .price-status.err     { color: var(--loss); }
    .price-status .mini-spin {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── Table ── */
    .table-wrapper {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    thead th {
      background: var(--surface);
      color: var(--text-dim);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      padding: 12px 14px;
      text-align: right;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    thead th:first-child, thead th:nth-child(2) { text-align: left; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(108, 99, 255, 0.05); }
    tbody td { padding: 12px 14px; text-align: right; vertical-align: middle; white-space: nowrap; }
    tbody td:first-child, tbody td:nth-child(2) { text-align: left; }

    .ticker-badge {
      display: inline-block;
      background: rgba(108, 99, 255, 0.15);
      color: var(--accent);
      border-radius: 5px;
      padding: 3px 8px;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.5px;
    }
    .gain-text  { color: var(--gain); }
    .loss-text  { color: var(--loss); }
    .neutral-text { color: var(--text-dim); }
    .price-cell { font-weight: 600; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 48px 16px; color: var(--text-dim); }
    .empty-state p { margin-top: 8px; font-size: 13px; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 13px;
      transition: transform 0.3s ease;
      z-index: 1000;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.error   { border-color: var(--loss); color: var(--loss); }
    #toast.success { border-color: var(--gain); color: var(--gain); }

    /* ── Manual price input in table ── */
    .manual-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-size: 13px;
      padding: 4px 7px;
      width: 90px;
      outline: none;
    }
    .manual-input:focus { border-color: var(--accent); }
    .price-error { color: var(--text-dim); font-size: 12px; cursor: help; }
    .last-updated { font-size: 11px; color: var(--text-dim); }
  </style>
</head>
<body>

<header>
  <h1>Aktien<span>Portfolio</span></h1>
  <button class="btn btn-ghost" id="refreshBtn" onclick="refreshViewPrices()">
    <span id="refreshIcon">↻</span> Kurse aktualisieren
  </button>
</header>

<!-- Summary -->
<div class="summary-grid">
  <div class="card">
    <div class="card-label">Investiert</div>
    <div class="card-value" id="sumInvested">—</div>
  </div>
  <div class="card">
    <div class="card-label" id="sumCurrentLabel">Wert</div>
    <div class="card-value" id="sumCurrent">—</div>
  </div>
  <div class="card">
    <div class="card-label">Gewinn / Verlust</div>
    <div class="card-value" id="sumPnL">—</div>
  </div>
  <div class="card">
    <div class="card-label">Rendite</div>
    <div class="card-value" id="sumPct">—</div>
  </div>
</div>

<!-- Date Slider -->
<div class="slider-section">
  <div class="slider-header">
    <div class="slider-date-display">
      <span class="label">Portfoliowert am</span>
      <span class="date-value" id="sliderDateLabel">–</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="slider-loading" id="sliderLoading" style="display:none;">
        <span class="spinner" style="width:12px;height:12px;border-width:2px;"></span> lädt…
      </span>
      <button class="btn btn-ghost btn-sm" id="todayBtn" onclick="resetToToday()">Heute</button>
    </div>
  </div>
  <input type="range" id="dateSlider" class="date-slider" min="0" max="0" value="0" disabled />
  <div class="slider-axis">
    <span id="sliderMinLabel">–</span>
    <span id="sliderMaxLabel">–</span>
  </div>
</div>

<!-- Add Position Form -->
<div class="form-section">
  <h2>Position hinzufügen</h2>
  <form class="form-row" id="addForm" onsubmit="handleAddSubmit(event)">
    <div class="field">
      <label>Ticker-Symbol</label>
      <input type="text" id="fTicker" placeholder="z. B. AAPL" required autocomplete="off" />
    </div>
    <div class="field">
      <label>Anzahl Aktien</label>
      <input type="number" id="fShares" placeholder="z. B. 10" min="0.0001" step="any" required />
    </div>
    <div class="field">
      <label>Kaufdatum</label>
      <input type="date" id="fDate" required />
    </div>
    <div class="field">
      <label>Kaufpreis (pro Aktie) <span id="priceStatus" class="price-status"></span></label>
      <input type="number" id="fPrice" placeholder="wird ermittelt…" min="0" step="any" required />
    </div>
    <button type="submit" class="btn btn-primary">+ Hinzufügen</button>
  </form>
</div>

<!-- Positions Table -->
<div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th>Ticker</th>
        <th>Kaufdatum</th>
        <th>Stück</th>
        <th>Kaufpreis</th>
        <th id="currentPriceHeader">Kurs</th>
        <th>Investiert</th>
        <th>Wert</th>
        <th>G/V (€)</th>
        <th>G/V (%)</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div id="emptyState" class="empty-state" style="display:none;">
  <strong>Keine Positionen vorhanden</strong>
  <p>Füge deine erste Position über das Formular oben hinzu.</p>
</div>

<div id="toast"></div>

<script>
  // ── Constants ─────────────────────────────────────────────────────────────
  const STORAGE_KEY = 'stockPortfolio';
  const MS_PER_DAY  = 86400000;

  // ── State ─────────────────────────────────────────────────────────────────
  let viewPrices  = {};   // id → price at selectedDate
  let viewLoading = {};   // id → true while fetching
  let viewErrors  = {};   // id → error string
  let selectedDate = todayStr();
  const priceCache = {};  // 'TICKER_YYYY-MM-DD' → price

  // ── Storage ───────────────────────────────────────────────────────────────
  function loadPortfolio() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : { positions: [] };
    } catch { return { positions: [] }; }
  }
  function savePortfolio(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function generateId() {
    return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2);
  }
  function todayStr() {
    return new Date().toISOString().split('T')[0];
  }
  function dateStrToDay(dateStr) {
    return Math.floor(new Date(dateStr + 'T12:00:00Z').getTime() / MS_PER_DAY);
  }
  function dayToDateStr(day) {
    return new Date(day * MS_PER_DAY).toISOString().split('T')[0];
  }
  function formatDate(dateStr) {
    return new Date(dateStr + 'T12:00:00Z').toLocaleDateString('de-DE', {
      day: '2-digit', month: 'short', year: 'numeric'
    });
  }

  // ── Formatting ────────────────────────────────────────────────────────────
  const fmtCurrency = new Intl.NumberFormat('de-DE', {
    style: 'currency', currency: 'USD', minimumFractionDigits: 2, maximumFractionDigits: 2
  });
  const fmtNumber = new Intl.NumberFormat('de-DE', {
    minimumFractionDigits: 2, maximumFractionDigits: 2
  });
  function fc(n) { return n != null ? fmtCurrency.format(n) : '—'; }
  function fn(n) { return fmtNumber.format(n); }
  function fp(n) { return (n >= 0 ? '+' : '') + fn(n) + ' %'; }
  function fpnl(n) { return (n >= 0 ? '+' : '') + fc(n); }
  function pnlClass(n) {
    if (n > 0) return 'gain-text';
    if (n < 0) return 'loss-text';
    return 'neutral-text';
  }

  // ── API ───────────────────────────────────────────────────────────────────
  async function fetchHistoricalPrice(ticker, dateStr) {
    const cacheKey = ticker + '_' + dateStr;
    if (priceCache[cacheKey] != null) return priceCache[cacheKey];

    const target  = new Date(dateStr + 'T12:00:00Z');
    const period1 = Math.floor(target.getTime() / 1000) - 7 * 86400;
    const period2 = Math.floor(target.getTime() / 1000) + 86400;
    const yfUrl   = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1d&period1=${period1}&period2=${period2}`;
    const res     = await fetch(`https://corsproxy.io/?${encodeURIComponent(yfUrl)}`, { signal: AbortSignal.timeout(10000) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data   = await res.json();
    const result = data?.chart?.result?.[0];
    if (!result) throw new Error(data?.chart?.error?.description ?? 'Kein Ergebnis');

    const timestamps = result.timestamp;
    const closes     = result.indicators?.quote?.[0]?.close;
    if (!timestamps || !closes) throw new Error('Keine Kursdaten');

    const targetTs = Math.floor(target.getTime() / 1000);
    let bestIdx = -1, bestDiff = Infinity;
    timestamps.forEach((ts, i) => {
      if (closes[i] == null) return;
      const diff = Math.abs(targetTs - ts);
      if (diff < bestDiff && targetTs - ts >= -86400) { bestDiff = diff; bestIdx = i; }
    });
    if (bestIdx === -1) throw new Error('Kein Handelstag in diesem Zeitraum');
    priceCache[cacheKey] = closes[bestIdx];
    return closes[bestIdx];
  }

  // ── Slider ────────────────────────────────────────────────────────────────
  function updateSlider() {
    const { positions } = loadPortfolio();
    const slider = document.getElementById('dateSlider');
    const today  = todayStr();
    const todayDay = dateStrToDay(today);

    if (positions.length === 0) {
      slider.disabled = true;
      document.getElementById('sliderMinLabel').textContent = '–';
      document.getElementById('sliderMaxLabel').textContent = '–';
      document.getElementById('sliderDateLabel').textContent = formatDate(today);
      return;
    }

    const minDate = positions.reduce((min, p) => p.purchaseDate < min ? p.purchaseDate : min, positions[0].purchaseDate);
    const minDay  = dateStrToDay(minDate);

    slider.min   = minDay;
    slider.max   = todayDay;
    slider.disabled = (minDay >= todayDay);

    const curDay = dateStrToDay(selectedDate);
    slider.value = Math.min(Math.max(curDay, minDay), todayDay);

    document.getElementById('sliderMinLabel').textContent = formatDate(minDate);
    document.getElementById('sliderMaxLabel').textContent = 'Heute, ' + formatDate(today);
    updateSliderLabel();
  }

  function updateSliderLabel() {
    const slider = document.getElementById('dateSlider');
    const date   = dayToDateStr(parseInt(slider.value));
    const isToday = date === todayStr();
    document.getElementById('sliderDateLabel').textContent =
      (isToday ? 'Heute, ' : '') + formatDate(date);
    document.getElementById('todayBtn').style.display = isToday ? 'none' : '';
  }

  let sliderDebounce;
  function onSliderInput() {
    updateSliderLabel();
    clearTimeout(sliderDebounce);
    sliderDebounce = setTimeout(() => {
      const date = dayToDateStr(parseInt(document.getElementById('dateSlider').value));
      selectedDate = date;
      loadViewPrices();
    }, 300);
  }

  function resetToToday() {
    selectedDate = todayStr();
    const slider = document.getElementById('dateSlider');
    slider.value = dateStrToDay(selectedDate);
    updateSliderLabel();
    loadViewPrices();
  }

  // ── View prices (price at selectedDate) ───────────────────────────────────
  async function loadViewPrices() {
    const { positions } = loadPortfolio();
    if (positions.length === 0) return;

    viewLoading = {};
    viewErrors  = {};
    positions.forEach(p => { viewLoading[p.id] = true; });
    document.getElementById('sliderLoading').style.display = 'flex';
    document.getElementById('currentPriceHeader').textContent =
      selectedDate === todayStr() ? 'Kurs (aktuell)' : 'Kurs (' + formatDate(selectedDate) + ')';
    document.getElementById('sumCurrentLabel').textContent =
      selectedDate === todayStr() ? 'Aktueller Wert' : 'Wert am ' + formatDate(selectedDate);
    renderTable(positions);

    const results = await Promise.allSettled(
      positions.map(p => fetchHistoricalPrice(p.ticker, selectedDate))
    );

    results.forEach((r, i) => {
      const id = positions[i].id;
      delete viewLoading[id];
      if (r.status === 'fulfilled') {
        viewPrices[id]  = r.value;
        delete viewErrors[id];
        // also persist as currentPrice when looking at today
        if (selectedDate === todayStr()) {
          const data = loadPortfolio();
          const pos  = data.positions.find(p => p.id === id);
          if (pos) { pos.currentPrice = r.value; pos.lastUpdated = new Date().toISOString(); }
          savePortfolio(data);
        }
      } else {
        viewErrors[id] = r.reason?.message ?? 'Fehler';
        delete viewPrices[id];
      }
    });

    document.getElementById('sliderLoading').style.display = 'none';
    const fresh = loadPortfolio().positions;
    renderTable(fresh);
    renderSummary(fresh);
  }

  async function refreshViewPrices() {
    // Bust cache for selected date so we refetch fresh data
    const { positions } = loadPortfolio();
    positions.forEach(p => { delete priceCache[p.ticker + '_' + selectedDate]; });
    const btn = document.getElementById('refreshBtn');
    const icon = document.getElementById('refreshIcon');
    btn.disabled = true;
    icon.innerHTML = '<span class="spinner" style="width:12px;height:12px;border-width:2px;"></span>';
    await loadViewPrices();
    btn.disabled = false;
    icon.textContent = '↻';
    showToast('Kurse aktualisiert.', 'success');
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function renderSummary(positions) {
    const allInvested = positions.reduce((s, p) => s + p.shares * p.purchasePrice, 0);
    document.getElementById('sumInvested').textContent = fc(allInvested);
    document.getElementById('sumInvested').className   = 'card-value';

    const withPrice = positions.filter(p => viewPrices[p.id] != null);
    if (withPrice.length === 0) {
      ['sumCurrent','sumPnL','sumPct'].forEach(id => {
        document.getElementById(id).textContent = '—';
        document.getElementById(id).className   = 'card-value neutral';
      });
      return;
    }

    const currentVal = withPrice.reduce((s, p) => s + p.shares * viewPrices[p.id], 0);
    const invested   = withPrice.reduce((s, p) => s + p.shares * p.purchasePrice, 0);
    const pnl = currentVal - invested;
    const pct = invested > 0 ? (pnl / invested) * 100 : null;

    document.getElementById('sumCurrent').textContent = fc(currentVal);
    document.getElementById('sumCurrent').className   = 'card-value';

    document.getElementById('sumPnL').textContent = fpnl(pnl);
    document.getElementById('sumPnL').className   = 'card-value ' + (pnl > 0 ? 'gain' : pnl < 0 ? 'loss' : '');

    document.getElementById('sumPct').textContent = pct !== null ? fp(pct) : '—';
    document.getElementById('sumPct').className   = 'card-value ' + (pct > 0 ? 'gain' : pct < 0 ? 'loss' : '');
  }

  function renderTable(positions) {
    const tbody = document.getElementById('tableBody');
    const empty = document.getElementById('emptyState');
    if (positions.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    tbody.innerHTML = positions.map(p => {
      const invested = p.shares * p.purchasePrice;
      let priceCell, currentVal, pnlCell, pctCell;

      if (viewLoading[p.id]) {
        priceCell  = `<span class="spinner"></span>`;
        currentVal = pnlCell = pctCell = '—';
      } else if (viewErrors[p.id]) {
        priceCell = `<span class="price-error" title="${escHtml(viewErrors[p.id])}">Fehler ⚠</span>`;
        currentVal = pnlCell = pctCell = '—';
      } else if (viewPrices[p.id] != null) {
        const price = viewPrices[p.id];
        const val   = p.shares * price;
        const pnl   = val - invested;
        const pct   = (pnl / invested) * 100;
        priceCell  = `<span class="price-cell">${fc(price)}</span>`;
        currentVal = fc(val);
        pnlCell    = `<span class="${pnlClass(pnl)}">${fpnl(pnl)}</span>`;
        pctCell    = `<span class="${pnlClass(pct)}">${fp(pct)}</span>`;
      } else {
        priceCell  = `<input class="manual-input" type="number" min="0" step="any" placeholder="manuell"
                        onchange="setManualPrice('${p.id}', this.value)" />`;
        currentVal = pnlCell = pctCell = '—';
      }

      return `<tr data-id="${p.id}">
        <td><span class="ticker-badge">${escHtml(p.ticker)}</span></td>
        <td>${escHtml(p.purchaseDate)}</td>
        <td>${fn(p.shares)}</td>
        <td>${fc(p.purchasePrice)}</td>
        <td>${priceCell}</td>
        <td>${fc(invested)}</td>
        <td>${currentVal}</td>
        <td>${pnlCell}</td>
        <td>${pctCell}</td>
        <td><button class="btn btn-danger" onclick="deletePosition('${p.id}')" title="Löschen">✕</button></td>
      </tr>`;
    }).join('');
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    const { positions } = loadPortfolio();
    updateSlider();
    renderTable(positions);
    renderSummary(positions);
  }

  // ── Actions ───────────────────────────────────────────────────────────────
  function handleAddSubmit(e) {
    e.preventDefault();
    const ticker        = document.getElementById('fTicker').value.trim().toUpperCase();
    const shares        = parseFloat(document.getElementById('fShares').value);
    const purchasePrice = parseFloat(document.getElementById('fPrice').value);
    const purchaseDate  = document.getElementById('fDate').value;

    if (!ticker || isNaN(shares) || shares <= 0 || isNaN(purchasePrice) || purchasePrice < 0 || !purchaseDate) {
      showToast('Bitte alle Felder korrekt ausfüllen.', 'error'); return;
    }
    const data = loadPortfolio();
    data.positions.push({ id: generateId(), ticker, shares, purchasePrice, purchaseDate, currentPrice: null, lastUpdated: null });
    savePortfolio(data);
    document.getElementById('addForm').reset();
    render();
    showToast(`${ticker} hinzugefügt.`, 'success');
    loadViewPrices();
  }

  function deletePosition(id) {
    const data = loadPortfolio();
    const pos  = data.positions.find(p => p.id === id);
    data.positions = data.positions.filter(p => p.id !== id);
    delete viewPrices[id]; delete viewLoading[id]; delete viewErrors[id];
    savePortfolio(data);
    render();
    if (pos) showToast(`${pos.ticker} entfernt.`, 'success');
  }

  function setManualPrice(id, raw) {
    const price = parseFloat(raw);
    if (isNaN(price) || price <= 0) return;
    viewPrices[id] = price;
    const { positions } = loadPortfolio();
    renderTable(positions);
    renderSummary(positions);
  }

  // ── Toast ─────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className   = type ? `show ${type}` : 'show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = type; }, 3000);
  }

  // ── Auto-fill historical price in form ────────────────────────────────────
  let autofillDebounce;
  function triggerAutofill() {
    clearTimeout(autofillDebounce);
    autofillDebounce = setTimeout(doAutofill, 400);
  }
  async function doAutofill() {
    const ticker     = document.getElementById('fTicker').value.trim().toUpperCase();
    const date       = document.getElementById('fDate').value;
    const priceInput = document.getElementById('fPrice');
    const statusEl   = document.getElementById('priceStatus');
    if (!ticker || !date) return;

    statusEl.className  = 'price-status loading';
    statusEl.innerHTML  = '<span class="mini-spin"></span> wird ermittelt…';
    priceInput.disabled = true;
    priceInput.classList.remove('autofilled');
    try {
      const price = await fetchHistoricalPrice(ticker, date);
      priceInput.value = price.toFixed(2);
      priceInput.classList.add('autofilled');
      statusEl.className   = 'price-status ok';
      statusEl.textContent = '✓ Automatisch ermittelt';
    } catch (e) {
      statusEl.className   = 'price-status err';
      statusEl.textContent = '⚠ ' + e.message;
      priceInput.value     = '';
      priceInput.placeholder = 'manuell eingeben';
    } finally {
      priceInput.disabled = false;
    }
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('fDate').value = todayStr();
    selectedDate = todayStr();

    // Restore viewPrices from stored currentPrice
    const { positions } = loadPortfolio();
    positions.forEach(p => { if (p.currentPrice != null) viewPrices[p.id] = p.currentPrice; });

    render();
    loadViewPrices();

    document.getElementById('dateSlider').addEventListener('input', onSliderInput);

    document.getElementById('fTicker').addEventListener('change', triggerAutofill);
    document.getElementById('fTicker').addEventListener('blur',   triggerAutofill);
    document.getElementById('fDate').addEventListener('change',   triggerAutofill);

    document.getElementById('fPrice').addEventListener('input', () => {
      document.getElementById('fPrice').classList.remove('autofilled');
      document.getElementById('priceStatus').className   = 'price-status';
      document.getElementById('priceStatus').textContent = '';
    });
    document.getElementById('addForm').addEventListener('reset', () => {
      document.getElementById('priceStatus').className   = 'price-status';
      document.getElementById('priceStatus').textContent = '';
      document.getElementById('fPrice').classList.remove('autofilled');
    });
  });
</script>
</body>
</html>
